<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FDP - Online Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg-gradient: radial-gradient(circle, #1a472a 0%, #05140a 100%); --gold: #ffd700; --card-back: repeating-linear-gradient(45deg, #1a2a6c, #1a2a6c 10px, #b21f1f 10px, #b21f1f 20px); }
        body { font-family: 'Segoe UI', sans-serif; background: #050f09; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 240px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--gold); }
        #main-game { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        #status-bar { width: 100%; background: rgba(0,0,0,0.8); padding: 15px; text-align: center; font-size: 18px; color: var(--gold); font-weight: bold; }
        #game-board { position: relative; width: 90%; max-width: 900px; height: 70vh; margin: 20px; border: 12px solid #3d2b1f; border-radius: 180px; background: var(--bg-gradient); }
        .card { width: 60px; height: 85px; background: white; border-radius: 6px; color: #222; position: relative; display: inline-block; margin: 5px; cursor: pointer; }
        .hidden-back { background: var(--card-back); border: 2px solid white; color: transparent; }
        .card .rank { position: absolute; top: 2px; left: 5px; font-size: 16px; font-weight: bold; }
        .card .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; }
        .card .suit-mini { position: absolute; bottom: 2px; right: 5px; font-size: 14px; }
        #table-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
<div id="sidebar"><div id="score-list"></div></div>
<div id="main-game">
    <div id="status-bar">Aguardando...</div>
    <div id="game-board">
        <div id="h1" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex;"></div>
        <div id="table-area"></div>
    </div>
    <button id="start-btn" onclick="socket.emit('startGame')" style="display:none">Começar</button>
    <div id="bet-zone"></div>
</div>

<script>
    const socket = io();
    socket.emit('joinGame', prompt("Seu nome:") || "Jogador");

    socket.on('updatePlayers', (ps) => {
        const me = ps.find(p => p.id === socket.id);
        if(me && me.isHost) document.getElementById('start-btn').style.display = 'block';
        document.getElementById('score-list').innerHTML = ps.map(p => `<div>${p.name}: ${p.lives}❤️</div>`).join('');
    });

    socket.on('receiveHand', (data) => {
        const h1 = document.getElementById('h1');
        h1.innerHTML = '';
        // REGRA: Oculta se for a primeira rodada
        const shouldHide = (data.currentCards === 1);
        data.hand.forEach(c => {
            const el = document.createElement('div');
            el.className = `card ${shouldHide ? 'hidden-back' : ''} ${(c.s==='♥'||c.s==='♦') ? 'red' : ''}`;
            if(!shouldHide) el.innerHTML = `<div class="rank">${c.v}</div><div class="center">${c.s}</div><div class="suit-mini">${c.s}</div>`;
            el.onclick = () => socket.emit('playCard', { card: c });
            h1.appendChild(el);
        });
    });

    socket.on('cardPlayed', (data) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.innerHTML = `<div class="center">${data.card.s}</div>`;
        document.getElementById('table-area').appendChild(el);
    });

    socket.on('requestBid', (data) => {
        const bz = document.getElementById('bet-zone'); bz.innerHTML = '';
        for(let i=0; i<=data.max; i++) {
            let b = document.createElement('button'); b.innerText = i;
            b.onclick = () => { socket.emit('submitBid', i); bz.innerHTML = ''; };
            bz.appendChild(b);
        }
    });

    socket.on('clearTable', () => document.getElementById('table-area').innerHTML = '');
    socket.on('statusUpdate', (m) => document.getElementById('status-bar').innerText = m);
</script>
</body>
</html>
