<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDP - Feedback Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg-gradient: radial-gradient(circle, #1a472a 0%, #05140a 100%); --gold: #ffd700; --card-back: repeating-linear-gradient(45deg, #1a2a6c, #1a2a6c 10px, #b21f1f 10px, #b21f1f 20px); }
        body { font-family: 'Segoe UI', sans-serif; background: #050f09; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 240px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--gold); display: flex; flex-direction: column; z-index: 100; }
        #scoreboard { padding: 15px; border-bottom: 1px solid #333; }
        #chat-box { flex-grow: 1; padding: 10px; font-size: 13px; overflow-y: auto; background: #000; color: #aaa; }
        #main-game { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        #status-bar { width: 100%; background: rgba(0,0,0,0.8); padding: 15px; text-align: center; font-size: 18px; color: var(--gold); font-weight: bold; min-height: 25px; }
        #game-board { position: relative; width: 90%; max-width: 900px; height: 70vh; margin: 20px; border: 12px solid #3d2b1f; border-radius: 180px; background: var(--bg-gradient); box-shadow: inset 0 0 100px #000; }
        .player-slot { position: absolute; width: 180px; text-align: center; padding: 10px; border-radius: 15px; transition: all 0.3s ease; background: rgba(0,0,0,0.4); }
        .active-turn { background: rgba(255, 215, 0, 0.2); box-shadow: 0 0 20px var(--gold); transform: scale(1.1); z-index: 10; }
        #p1 { bottom: 10px; left: 50%; transform: translateX(-50%); }
        #p2 { right: 10px; top: 50%; transform: translateY(-50%); }
        #p3 { top: 10px; left: 50%; transform: translateX(-50%); }
        #p4 { left: 10px; top: 50%; transform: translateY(-50%); }
        .info-box { font-size: 12px; margin-bottom: 5px; }
        .bet-done { color: #00ff00; font-weight: bold; margin-left: 5px; }
        .hand { display: flex; justify-content: center; height: 90px; perspective: 1000px; }
        .card { width: 60px; height: 85px; background: white; border-radius: 6px; color: #222; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.6); cursor: pointer; transition: transform 0.2s; flex-shrink: 0; border: 1px solid #999; }
        .hand .card:not(:first-child) { margin-left: -35px; }
        .hand .card:hover { transform: translateY(-15px); z-index: 100 !important; }
        .card.red { color: #cc0000; }
        .card.hidden-back { background: var(--card-back); border: 2px solid white; }
        .card .rank { position: absolute; top: 2px; left: 5px; font-size: 16px; font-weight: bold; }
        .card .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; }
        .card .suit-mini { position: absolute; bottom: 2px; right: 5px; font-size: 14px; }
        #table-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 200px; display: flex; justify-content: center; align-items: center; }
        .played-card { position: absolute; animation: throwCard 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes throwCard { 0% { transform: scale(0.2) rotate(0deg); opacity: 0; } 100% { transform: scale(1) rotate(var(--rot)); opacity: 1; } }
        #controls { padding: 10px; z-index: 100; }
        button { padding: 12px 25px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; box-shadow: 0 4px #b89b00; }
        .bet-btn { margin: 3px; font-size: 16px; }
    </style>
</head>
<body>
<div id="sidebar"><div id="scoreboard"><h3 style="margin:0; color:var(--gold)">🏆 Placar</h3><div id="score-list" style="margin-top:10px"></div></div><div id="chat-box"></div></div>
<div id="main-game">
    <div id="status-bar">Aguardando início...</div>
    <div id="game-board">
        <div id="p1" class="player-slot"><div class="info-box" id="i1"></div><div class="hand" id="h1"></div></div>
        <div id="p2" class="player-slot"><div class="info-box" id="i2"></div><div class="hand" id="h2"></div></div>
        <div id="p3" class="player-slot"><div class="info-box" id="i3"></div><div class="hand" id="h3"></div></div>
        <div id="p4" class="player-slot"><div class="info-box" id="i4"></div><div class="hand" id="h4"></div></div>
        <div id="table-area"></div>
    </div>
    <div id="controls"><button id="start-btn" onclick="startGame()">Começar Partida</button><div id="bet-zone"></div></div>
</div>

<script>
    const socket = io();
    // A cada jogada ou aposta, enviamos o estado pelo socket
    function emitAction(type, data) { socket.emit('gameAction', { type, data }); }
    
    // Escuta jogadas dos amigos
    socket.on('remoteAction', (msg) => {
        if(msg.type === 'playCard') { /* Atualiza tableCards e renderTable() aqui */ }
    });

    const au = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, t, d) { const o = au.createOscillator(); const g = au.createGain(); o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, au.currentTime + d); o.connect(g); g.connect(au.destination); o.start(); o.stop(au.currentTime + d); }
    const suits = ['♣', '♥', '♠', '♦'];
    const values = ['4', '5', '6', '7', 'Q', 'J', 'K', 'A', '2', '3'];
    const power = {'4♣':100,'7♥':99,'A♠':98,'7♦':97,'3':10,'2':9,'A':8,'K':7,'J':6,'Q':5,'7':4,'6':3,'5':2,'4':1};
    let players = [
        { id: 0, name: "Você", lives: 3, hand: [], bid: 0, won: 0, bot: false, hasBetted: false },
        { id: 1, name: "Sincero", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false },
        { id: 2, name: "Debochado", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false },
        { id: 3, name: "Calculista", lives: 3, hand: [], bid: 0, won: 0, bot: true, hasBetted: false }
    ];
    let currentCards = 1; let turnStarter = 0; let roundStarter = 0; let tableCards = [];

    function updateStatus(m) { document.getElementById('status-bar').innerText = m; }
    function highlightPlayer(id) { document.querySelectorAll('.player-slot').forEach(s => s.classList.remove('active-turn')); if(id !== null) document.getElementById(`p${id+1}`).classList.add('active-turn'); }
    async function startGame() { document.getElementById('start-btn').style.display = 'none'; roundStarter = Math.floor(Math.random() * 4); gameLoop(); }
    async function gameLoop() {
        if (currentCards > 10) return updateStatus("FIM DO JOGO!");
        players.forEach(p => { p.hand = []; p.bid = 0; p.won = 0; p.hasBetted = false; });
        tableCards = []; renderTable();
        let deck = [];
        for(let s of suits) for(let v of values) deck.push({s, v, id: v+s});
        deck.sort(() => Math.random() - 0.5);
        for(let i=0; i<currentCards; i++) { players.forEach(p => { if(p.lives > 0) p.hand.push(deck.pop()); }); }
        turnStarter = roundStarter; render(); await handleBids(); await handleTricks();
        roundStarter = (roundStarter + 1) % 4; currentCards++; gameLoop();
    }
    async function handleBids() {
        let bidder = roundStarter; let sum = 0; let active = players.filter(p => p.lives > 0).length;
        for (let i=0; i < active; i++) {
            let p = players[bidder]; let forbidden = (i === active - 1) ? (currentCards - sum) : -1;
            highlightPlayer(bidder);
            if (p.bot) { updateStatus(`${p.name} está pensando...`); await new Promise(r => setTimeout(r, 800)); let strength = p.hand.filter(c => (power[c.id] || power[c.v]) > 7).length; p.bid = Math.min(currentCards, strength); if (p.bid === forbidden) p.bid = p.bid === 0 ? 1 : p.bid - 1; } 
            else { updateStatus("Sua vez! Quantas você leva?"); p.bid = await askBid(forbidden); }
            p.hasBetted = true; sum += p.bid; sfx(400, 'sine', 0.1); render(); bidder = (bidder + 1) % 4;
        }
        highlightPlayer(null);
    }
    function askBid(f) { return new Promise(res => { const zone = document.getElementById('bet-zone'); zone.innerHTML = ''; for(let i=0; i<=currentCards; i++) { if(i===f) continue; let b = document.createElement('button'); b.className = 'bet-btn'; b.innerText = i; b.onclick = () => { zone.innerHTML=''; res(i); }; zone.appendChild(b); } }); }
    async function handleTricks() {
        for(let t=0; t<currentCards; t++) {
            tableCards = []; let pIdx = turnStarter;
            for(let i=0; i<4; i++) {
                let p = players[pIdx];
                if(p.lives > 0) {
                    highlightPlayer(pIdx);
                    let card = p.bot ? (p.hand.sort((a,b) => (power[a.id]||power[a.v]) - (power[b.id]||power[b.v])), p.won < p.bid ? p.hand.pop() : p.hand.shift()) : await waitCard();
                    tableCards.push({card, owner: pIdx, rot: (Math.random()*20 - 10)});
                    sfx(600, 'sine', 0.1); render(); renderTable();
                }
                pIdx = (pIdx + 1) % 4;
            }
            let winIdx = calcWinner(tableCards); players[winIdx].won++; turnStarter = winIdx;
            updateStatus(`${players[winIdx].name} venceu a vaza!`); sfx(800, 'triangle', 0.2); await new Promise(r => setTimeout(r, 1500)); tableCards = []; renderTable();
        }
        await endRound();
    }
    function waitCard() { return new Promise(res => { const cards = document.querySelectorAll('#h1 .card'); cards.forEach((c, i) => { c.onclick = () => { res(players[0].hand.splice(i,1)[0]); }; }); }); }
    function calcWinner(list) { let sc = list.map(x => ({...x, pwr: power[x.card.id] || power[x.card.v]})); let counts = {}; sc.forEach(s => counts[s.pwr] = (counts[s.pwr] || 0) + 1); let valid = sc.filter(s => counts[s.pwr] === 1); if (valid.length === 0) { let max = Math.max(...sc.map(s => s.pwr)); let ties = sc.filter(s => s.pwr === max); const suitsP = {'♣':4,'♥':3,'♠':2,'♦':1}; return ties.sort((a,b) => suitsP[b.card.s] - suitsP[a.card.s])[0].owner; } return valid.sort((a,b) => b.pwr - a.pwr)[0].owner; }
    async function endRound() { players.forEach(p => { if(p.lives > 0 && p.bid !== p.won) p.lives--; }); render(); updateStatus("Fim da rodada!"); await new Promise(r => setTimeout(r, 2000)); }
    function render() {
        players.forEach((p, i) => {
            const info = document.getElementById(`i${i+1}`); info.innerHTML = `<b>${p.name}</b> ${p.hasBetted ? '<span class="bet-done">✅</span>' : ''}<br><span style="color:#ff5555">❤️ ${p.lives}</span> | Aposta: ${p.bid} | Fez: ${p.won}`;
            const h = document.getElementById(`h${i+1}`); h.innerHTML = '';
            if (p.lives <= 0) { info.innerHTML = "ELIMINADO"; return; }
            p.hand.forEach((c, idx) => {
                const el = document.createElement('div');
                let hide = (currentCards === 1) ? (p.id === 0) : p.bot;
                el.className = `card ${(c.s==='♥'||c.s==='♦') ? 'red' : ''} ${hide ? 'hidden-back' : ''}`;
                if(!hide) el.innerHTML = `<div class="rank">${c.v}</div><div class="center">${c.s}</div><div class="suit-mini">${c.s}</div>`;
                h.appendChild(el);
            });
        });
        document.getElementById('score-list').innerHTML = [...players].sort((a,b) => b.lives - a.lives).map(p => `<div>${p.name}: ${p.lives}❤️</div>`).join('');
    }
    function renderTable() { const area = document.getElementById('table-area'); area.innerHTML = ''; tableCards.forEach(item => { const el = document.createElement('div'); el.className = `card played-card ${(item.card.s==='♥'||item.card.s==='♦') ? 'red' : ''}`; el.style.setProperty('--rot', `${item.rot}deg`); el.innerHTML = `<div class="rank">${item.card.v}</div><div class="center">${item.card.s}</div><div class="suit-mini">${item.card.s}</div>`; area.appendChild(el); }); }
</script>
</body>
</html>
