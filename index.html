<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FDP Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Mantenha seu CSS original aqui */
        .card { width: 60px; height: 85px; background: white; border-radius: 6px; display: inline-block; border: 1px solid #999; }
        .hidden-back { background: repeating-linear-gradient(45deg, #1a2a6c, #1a2a6c 10px, #b21f1f 10px, #b21f1f 20px); }
        .red { color: red; }
    </style>
</head>
<body>
    <div id="status-bar">Aguardando...</div>
    <div id="h1"></div>
    <div id="table-area"></div>
    <button id="start-btn" onclick="socket.emit('startGame')" style="display:none">Começar</button>
    <div id="bet-zone"></div>

    <script>
        const socket = io();
        let currentCards = 1;

        window.onload = () => { socket.emit('joinGame', prompt("Nome:") || "Jogador"); };

        socket.on('updatePlayers', (ps) => {
            const me = ps.find(p => p.id === socket.id);
            if(me && me.isHost) document.getElementById('start-btn').style.display = 'block';
        });

        socket.on('receiveHand', (data) => {
            currentCards = data.round;
            const h1 = document.getElementById('h1');
            h1.innerHTML = '';
            data.hand.forEach(c => {
                const el = document.createElement('div');
                // LÓGICA: Se rodada 1, mostra a face. Se não, oculta (ou inverta se quiser).
                const showFace = (currentCards === 1);
                el.className = `card ${showFace ? '' : 'hidden-back'} ${(c.s==='♥'||c.s==='♦') ? 'red' : ''}`;
                if(showFace) el.innerHTML = `${c.v}${c.s}`;
                el.onclick = () => { socket.emit('playCard', {card: c}); el.remove(); };
                h1.appendChild(el);
            });
        });

        socket.on('cardPlayed', (data) => {
            // Desenha a carta na mesa
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `${data.card.v}${data.card.s}`;
            document.getElementById('table-area').appendChild(el);
        });

        socket.on('requestBid', (data) => {
            const bz = document.getElementById('bet-zone'); bz.innerHTML = '';
            for(let i=0; i<=data.max; i++) {
                let b = document.createElement('button'); b.innerText = i;
                b.onclick = () => { socket.emit('submitBid', i); bz.innerHTML = ''; };
                bz.appendChild(b);
            }
        });

        socket.on('clearTable', () => { document.getElementById('table-area').innerHTML = ''; });
        socket.on('statusUpdate', (m) => { document.getElementById('status-bar').innerText = m; });
    </script>
</body>
</html>
